# MySQL root 密码须为 ASCII（PyMySQL 限制）；勿使用中文密码。
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # 宿主机端口 → 容器 3306；Navicat 连 127.0.0.1:端口。生产勿对公网开放。
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-personal_blog}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-personal_blog}?charset=utf8mb4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      # 前端与 API 不同域时填写；同域经 Nginx 反代可保持默认本地开发域名即可
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    # 宿主可直连后端（调试 Swagger / 绕过 Nginx）；不需要可在下方加注释
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 与下方 Nginx 反代配合：留空则 axios 请求同源 /api/...
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
